# Wi-Fi credentials — only needed for the Wi-Fi build
# (switchbot-keypad-bridge.yaml). The wired WT32-ETH01 / Ethernet build
# (switchbot-keypad-bridge-wt32-eth01.yaml) ignores these.
wifi_ssid: "your_network_name"
wifi_password: "your_wifi_password"

# Needed by every build.
ota_password: "a_strong_ota_password"

# Optional: protect the on-device web console (pairing wizard + config) with
# HTTP Basic Auth. Omit to leave it open on your LAN.
web_password: "a_strong_web_password"
