esphome:
  name: switchbot-keypad-bridge

esp32:
  board: seeed_xiao_esp32s3
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

external_components:
  - source: github://pierluigizagaria/switchbot-keypad-bridge
    components: [switchbot_keypad_bridge]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  level: VERBOSE

api:

ota:
  - platform: esphome
    password: !secret ota_password

# TLS in the pairing wizard needs a valid system clock; SNTP keeps it set
# even before Home Assistant connects.
time:
  - platform: sntp

switchbot_keypad_bridge:
  keypad_action:
    name: "Action"

  keypad:
    name: "Keypad"

  # Keypad battery, read from its BLE advertisement once per scan interval.
  battery_level:
    name: "Keypad Battery"
  # battery_scan_interval: 15min

  unpair_button:
    name: "Unpair"

  on_unlock:
    # method: "pin" | "fingerprint" | "nfc" | "face" | "unknown"   index: credential slot
    - homeassistant.event:
        event: esphome.switchbot_keypad_unlock
        data:
          method: !lambda 'return method;'
          index: !lambda 'return to_string(index);'
  
  # on_lock:
  #   - logger.log: "Locked"

  # on_doorbell:
  #   - logger.log: "Doorbell pressed"
