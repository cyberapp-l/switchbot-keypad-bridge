esphome:
  name: switchbot-keypad-bridge

esp32:
  board: seeed_xiao_esp32s3
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

# This combined branch adds options (users, last_user, web_password, the
# Activity + Users tabs, i18n) that only exist in THIS repo's component — so
# build against the LOCAL copy, not the upstream GitHub source. To pull it from
# your fork's branch instead, use:
#   - source: github://cyberapp-l/switchbot-keypad-bridge@combined
#     components: [switchbot_keypad_bridge]
external_components:
  - source:
      type: local
      path: components
    components: [switchbot_keypad_bridge]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  level: VERBOSE

api:

ota:
  - platform: esphome
    password: !secret ota_password

# TLS in the pairing wizard needs a valid system clock; SNTP keeps it set
# even before Home Assistant connects.
time:
  - platform: sntp

switchbot_keypad_bridge:
  keypad_action:
    name: "Action"

  keypad:
    name: "Keypad"

  # Keypad battery, read from its BLE advertisement once per scan interval.
  battery_level:
    name: "Keypad Battery"

  # ↓ battery_scan_interval is a SIBLING of battery_level (2-space indent),
  #   NOT nested under it. Minimum 30s. You can also set it live in the web
  #   console → Settings tab (no reflash).
  # battery_scan_interval: 15min

  unpair_button:
    name: "Unpair"

  # "Who unlocked" diagnostics. last_user resolves the credential to a name
  # from the `users:` map below (falls back to "<method> #<index>").
  last_user:
    name: "Last User"
  last_method:
    name: "Last Method"

  # Keypad liveness / signal (diagnostic).
  rssi:
    name: "Keypad Signal"
  keypad_connected:
    name: "Keypad Connected"
  last_seen:
    name: "Keypad Last Seen"
    device_class: timestamp

  # Alarm / status flags (Keypad Vision only). Wiring any alarm makes the advert
  # scan run at alarm_scan_interval (below) instead of the slow battery interval,
  # so alarms are caught promptly — while battery scanning stays slow.
  #   tamper  = pried off its mount   duress = a duress/panic code was entered
  #   lockout = too many wrong tries  motion = PIR/radar  charging = on charger
  alarm_scan_interval: 30s   # min 5s; lower = faster alarms, more radio use
  tamper:
    name: "Keypad Tamper"
  duress:
    name: "Keypad Duress"
  lockout:
    name: "Keypad Lockout"
  motion:
    name: "Keypad Motion"
  charging:
    name: "Keypad Charging"

  on_tamper:
    - homeassistant.event:
        event: esphome.switchbot_keypad_tamper
  on_duress:
    - homeassistant.event:
        event: esphome.switchbot_keypad_duress

  # Optional per-method running counters (reset on reboot).
  unlock_counts:
    pin:
      name: "PIN Unlocks"
    fingerprint:
      name: "Fingerprint Unlocks"
    face:
      name: "Face Unlocks"
    # nfc:
    #   name: "NFC Unlocks"

  # Drop duplicate unlocks from the same credential within this window.
  min_unlock_interval: 3s

  # Protect the always-on web console (pairing wizard + config) with a login.
  # Omit web_password to leave it open on the LAN. Username defaults to "admin".
  # web_username: "admin"
  # web_password: !secret web_password

  # Map credential slots to names. `method` defaults to "any", `index` to -1
  # (any slot of that method). Add your own:
  # users:
  #   - name: "Liran"
  #     method: fingerprint
  #     index: 0
  #   - name: "Family PIN"
  #     method: pin
  #     index: 1

  on_unlock:
    # method: "pin" | "fingerprint" | "nfc" | "face" | "unknown"
    # index:  credential slot         name: resolved user (from users:, may be empty)
    - homeassistant.event:
        event: esphome.switchbot_keypad_unlock
        data:
          method: !lambda 'return method;'
          index: !lambda 'return to_string(index);'
          name: !lambda 'return name;'
  
  # on_lock:
  #   - logger.log: "Locked"

  # on_doorbell:
  #   - logger.log: "Doorbell pressed"
